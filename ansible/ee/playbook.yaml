---
- name: Loadshedding Automation for Lab Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Pulls from the OpenShift Secret via Container Env
    esp_token: "{{ lookup('env', 'ESP_TOKEN') }}"
    area_id: "eskme-2-stellenboschstellenboschwesterncape"

    # Use "future" for testing, "" (empty string) for real-world usage
    test_mode: "future"

    # Your specific BMH nodes
    target_hosts:
      - { name: "lab", namespace: "openshift-machine-api" }
      - { name: "sno-spoke", namespace: "home" }

  tasks:
    - name: Validate Environment
      ansible.builtin.fail:
        msg: "The ESP_TOKEN environment variable is not set! Check your OpenShift Secret."
      when: esp_token | length == 0

    - name: Query EskomSePush API
      ansible.builtin.uri:
        url: "https://developer.sepush.co.za/business/2.0/area?id={{ area_id }}{{ '&test=' + test_mode if test_mode != '' else '' }}"
        method: GET
        headers:
          token: "{{ esp_token }}"
        return_content: yes
      register: esp_api_response

    - name: Calculate Power Status
      ansible.builtin.set_fact:
        # Checks if current time (SAST UTC+2) falls between an event start and end
        outage_active: >-
          {{
            esp_api_response.json.events | selectattr('start', 'le', now(fmt='%Y-%m-%dT%H:%M:%S+02:00'))
            | selectattr('end', 'ge', now(fmt='%Y-%m-%dT%H:%M:%S+02:00'))
            | list | length > 0
          }}

    - name: Apply Power State to BareMetalHosts
      ansible.builtin.shell: |
        oc patch bmh {{ item.name }} -n {{ item.namespace }} --type merge -p '{"spec":{"online":{{ "false" if outage_active else "true" }}}}'
      loop: "{{ target_hosts }}"
      register: patch_results
      changed_when: "'patched' in patch_results.stdout"

    - name: Create OpenShift Event for Visibility
      ansible.builtin.shell: |
        oc create event {{ item.name }}-power-check-{{ 1000 | random }} \
          --message="Loadshedding automation set {{ item.name }} online={{ 'false' if outage_active else 'true' }}" \
          -n {{ item.namespace }}
      loop: "{{ target_hosts }}"
      # Only create an event if we actually changed something
      when: patch_results is changed
      ignore_errors: yes

    - name: Debug Summary
      ansible.builtin.debug:
        msg:
          - "Area: {{ esp_api_response.json.info.name }}"
          - "Outage Active: {{ outage_active }}"
          - "Targets Processed: {{ target_hosts | map(attribute='name') | join(', ') }}"
