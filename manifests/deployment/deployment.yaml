---
# 1. The Secret to store your EskomSePush Token safely
apiVersion: v1
kind: Secret
metadata:
  name: eskom-certs
  namespace: openshift-machine-api
type: Opaque
stringData:
  # Replace XXXXXXXXXX with your actual token before applying
  token: "XXXXXXXXXX"

---
# 2. The Service Account that runs the container
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loadshedding
  namespace: openshift-machine-api

---
# 3. ClusterRole to allow editing BareMetalHosts across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bmh-loadshedding-editor
rules:
  - apiGroups: ["metal3.io"]
    resources: ["baremetalhosts"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# 4. Bind the ServiceAccount to the ClusterRole for both namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loadshedding-cross-ns-binding
subjects:
  - kind: ServiceAccount
    name: loadshedding
    namespace: openshift-machine-api
roleRef:
  kind: ClusterRole
  name: bmh-loadshedding-editor
  apiGroup: rbac.authorization.k8s.io

---
# 5. The CronJob to execute the automation
apiVersion: batch/v1
kind: CronJob
metadata:
  name: loadshedding-checker
  namespace: openshift-machine-api
spec:
  schedule: "*/30 * * * *" # Runs every 30 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          serviceAccountName: loadshedding
          restartPolicy: OnFailure
          containers:
            - name: ansible-worker
              # Your Quay image built for linux/amd64
              image: quay.io/dabreu/loadshedding:latest
              imagePullPolicy: Always
              env:
                - name: HOME
                  value: /ansible
                - name: ESP_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: eskom-certs
                      key: token
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
