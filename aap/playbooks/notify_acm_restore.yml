---
# Playbook: Notify ACM — Restore
# Enables the restore policy PAIR on the ACM hub.
# ACM then handles: direct Redfish power-on via sushy, uncordon, health check.
#
# Variables injected by EDA when triggered automatically:
#   area_name
# Has a default so the playbook also works when launched manually
# from AAP without extra vars.

- name: Enable ACM loadshedding restore policies
  hosts: localhost
  gather_facts: false

  vars:
    area_name: "manual-trigger"

  tasks:
    - name: Log trigger
      ansible.builtin.debug:
        msg: >
          Loadshedding restore triggered for {{ area_name }}.
          Enabling ACM restore policy pair — ACM will power on
          and uncordon lab1 and lab2 via direct Redfish.

    - name: Disable ACM shutdown policy pair first
      ansible.builtin.uri:
        url: "{{ acm_hub_url }}/apis/policy.open-cluster-management.io/v1/namespaces/open-cluster-management/policies/{{ item }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ acm_token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            disabled: true
        validate_certs: false
        status_code: [200, 201, 204]
      loop:
        - loadshedding-shutdown-policy
        - loadshedding-poweroff-hub-policy

    - name: Enable ACM restore policy pair
      ansible.builtin.uri:
        url: "{{ acm_hub_url }}/apis/policy.open-cluster-management.io/v1/namespaces/open-cluster-management/policies/{{ item }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ acm_token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          metadata:
            annotations:
              loadshedding.io/restored-at: "{{ ansible_date_time.iso8601 | default('') }}"
              loadshedding.io/area: "{{ area_name }}"
          spec:
            disabled: false
        validate_certs: false
        status_code: [200, 201, 204]
      loop:
        - loadshedding-restore-policy
        - loadshedding-poweron-hub-policy

    - name: Confirm
      ansible.builtin.debug:
        msg: >
          ACM restore policy pair enabled.
          loadshedding-restore-policy and loadshedding-poweron-hub-policy
          are now active. ACM will power on and uncordon lab1 and lab2.
