---
# Playbook: Notify ACM — Shutdown
# Enables the shutdown policy PAIR on the ACM hub.
# ACM then handles: cordon, drain, and direct Redfish power-off via sushy.
#
# Variables injected by EDA when triggered automatically:
#   area_name, loadshedding_start, loadshedding_end
# These have defaults so the playbook also works when launched manually
# from AAP without extra vars.

- name: Enable ACM loadshedding shutdown policies
  hosts: localhost
  gather_facts: false

  vars:
    area_name: "manual-trigger"
    loadshedding_start: "unknown"
    loadshedding_end: "unknown"

  tasks:
    - name: Log trigger
      ansible.builtin.debug:
        msg: >
          Loadshedding shutdown triggered for {{ area_name }}.
          Window: {{ loadshedding_start }} to {{ loadshedding_end }}.
          Enabling ACM shutdown policy pair — ACM will cordon, drain
          and power off lab1 and lab2 via direct Redfish.

    - name: Disable ACM restore policy pair first
      ansible.builtin.uri:
        url: "{{ acm_hub_url }}/apis/policy.open-cluster-management.io/v1/namespaces/open-cluster-management/policies/{{ item }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ acm_token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            disabled: true
        validate_certs: false
        status_code: [200, 201, 204]
      loop:
        - loadshedding-restore-policy
        - loadshedding-poweron-hub-policy

    - name: Enable ACM shutdown policy pair
      ansible.builtin.uri:
        url: "{{ acm_hub_url }}/apis/policy.open-cluster-management.io/v1/namespaces/open-cluster-management/policies/{{ item }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ acm_token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          metadata:
            annotations:
              loadshedding.io/outage-start: "{{ loadshedding_start }}"
              loadshedding.io/outage-end: "{{ loadshedding_end }}"
              loadshedding.io/triggered-by: "eda-eskomsepush"
              loadshedding.io/area: "{{ area_name }}"
          spec:
            disabled: false
        validate_certs: false
        status_code: [200, 201, 204]
      loop:
        - loadshedding-shutdown-policy
        - loadshedding-poweroff-hub-policy

    - name: Confirm
      ansible.builtin.debug:
        msg: >
          ACM shutdown policy pair enabled.
          loadshedding-shutdown-policy and loadshedding-poweroff-hub-policy
          are now active. ACM will cordon, drain and power off lab1 and lab2.
